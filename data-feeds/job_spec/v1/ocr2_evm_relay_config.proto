syntax = "proto3";

package job_spec.v1;

option go_package = "github.com/smartcontractkit/chainlink-protos/data-feeds/job_spec/v1";

// OCR2EVMRelayConfig is a typed view of the EVM relay config JSON.
message OCR2EVMRelayConfig {
  string chain_id = 1;
  optional uint64 from_block = 2;
  string effective_transmitter_id = 3;
  optional bool enable_dual_transmission = 4;
  optional bool enable_trigger_capability = 5;
  optional uint64 llo_don_id = 6;
  optional string feed_id = 7;
  repeated string sending_keys = 8;
  optional string provider_type = 9;
}
