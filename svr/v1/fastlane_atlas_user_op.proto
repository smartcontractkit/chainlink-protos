syntax = "proto3";

package svr.v1;

option go_package = "github.com/smartcontractkit/chainlink-protos/svr/v1";

message FastLaneAtlasUserOp {
  string chain_id = 1;
  string from_address = 2;
  string to_address = 3;
  string feed_address = 4;
  string nonce = 5;
  string user_op_hash = 6;
  string transaction_lifecycle_id = 7;
  int64 request_sent_at = 8;
  int64 response_received_at = 9;
}
