syntax = "proto3";

package workflows.v2;

import "workflows/v2/cre_info.proto";
import "workflows/v2/workflow_key.proto";
import "workflows/v2/xxx_no_send.proto";

option go_package = "github.com/smartcontractkit/chainlink-protos/workflows/go/v2";

message WorkflowExecutionFinished {
  CreInfo creInfo = 1;
  WorkflowKey workflow = 2;
  string workflowExecutionID = 3;
  string timestamp = 4;

  ExecutionStatus status = 5;
  string error = 6;
  bool executedInTEE = 7;

  // classifiedStatus attributes a terminal outcome to the user vs the platform.
  // It is set alongside `status`: SUCCEEDED mirrors status, while a failure is
  // reported as USER_ERROR or SYSTEM_ERROR. Consumers that do not understand it
  // fall back to `status`.
  ClassifiedExecutionStatus classifiedStatus = 8;
}
