syntax = "proto3";

package common.v1;

option go_package = "github.com/smartcontractkit/chainlink-protos/node-platform/common/v1";

message NodeInfo {
  // key info
  string csa_public_key = 1;
  // build info
  string commit_sha = 2;
  string version_tag = 3;
  string version = 4;
  string docker_tag = 5;
  // health metrics
  bool healthy = 6;
  map<string, string> health_errors = 7;
}
