syntax = "proto3";
package metering.v1;

option go_package = "github.com/smartcontractkit/chainlink-protos/metering/go;metering";

// Utilization quantifies one billed unit for a metered action (MeterRecord) or
// the periodic level of one active resource dimension (MeterSnapshot). The
// resource itself is identified entirely by the accompanying ResourceIdentity;
// Utilization carries no identifying metadata of its own.
message Utilization {
  // Quantity of the resource_type unit: the amount affected by a MeterRecord
  // action, or the current level of the resource in a MeterSnapshot.
  int64 value = 1;
}
