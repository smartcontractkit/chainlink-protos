syntax = "proto3";
package metering.v1;

option go_package = "github.com/smartcontractkit/chainlink-protos/metering/go;metering";

// ResourceIdentity is the structured, first-class identity of a durable
// resource. It is embedded by every metering message (MeterRecord and
// Snapshot) so downstream aggregators, analytics, and UI can treat each
// dimension as a discrete column rather than parsing a dotted string or
// carrying values out-of-band on telemetry.
message ResourceIdentity {
  // Deployment product, e.g. "cre". One of the deployment+DON+node
  // dimensions used for coarse billing rollup.
  string product = 1;
  // Deployment tenant name, e.g. "mainline" or "enterprise". This is the
  // human-readable tenant label (not the numeric tenant ID).
  string tenant = 2;
  // Numeric tenant identifier as used by Accounts/Linking/registry/Vault DON.
  // This is a numbered identifier represented as a string.
  string numeric_tenant_id = 3;
  // Deployment environment, e.g. "production", "staging". A coarse
  // billing-rollup dimension.
  string environment = 4;
  // Deployment zone, e.g. "wf-zone-a". A coarse billing-rollup dimension.
  string zone = 5;
  // DON-specific identity dimensions. Present only for DON emitters. Web2 or
  // other non-DON emitters leave this unset instead of sending empty IDs.
  optional DonIdentity don = 6;
  // Stable service constant identifying the emitting service (the old
  // `entity`), e.g. "cron-trigger", "http-trigger", "evm-log-trigger",
  // "workflow-syncer-v2". A coarse billing-rollup dimension.
  string service = 7;
  // Resource pool the action applies to, e.g. "trigger_registrations",
  // "log_filters", "workflow_storage". Human friendly name
  string resource_pool = 8;
  // optionality to add a level of hierarchy within the resource_pool, or
  // UID a resource_pool
  string resource_pool_id = 9;
}

// DonIdentity captures DON-only identity dimensions together so consumers can
// branch on message presence, not individual field permutations.
message DonIdentity {
  // The authoritative DON ID of the emitting service. For capability LOOPs this
  // is CapDONID supplied over the standardcapabilities interface; for
  // workflow-DON services (e.g. the syncer) it is the workflow DON ID.
  string don_id = 1;
  // The node's logical name (e.g. "clp-cre-wf-zone-a-1"), not the CSA public
  // key. Events will include csa key, handled by ChIP rotating signer. In the long
  // term, the ResourceIdentity + DonIdentity should be unambiguous to aggregate.
  string node_id = 2;
}

// MeterAction identifies the billing semantics of a MeterRecord. Producers emit
// only METER_ACTION_UPDATE and METER_ACTION_USAGE; the action value is the
// durable-vs-one-off discriminator.
enum MeterAction {
  // Unknown / unset.
  METER_ACTION_UNSPECIFIED = 0;
  // Deprecated: retained for wire compatibility; producers must not emit.
  // Historical pairing semantics are void.
  METER_ACTION_RESERVE = 1;
  // Deprecated: retained for wire compatibility; producers must not emit.
  // Historical pairing semantics are void.
  METER_ACTION_RELEASE = 2;
  // A signed delta to a durable resource's level; the only action emitted for
  // durable resources. Value semantics are defined on Utilization.value.
  METER_ACTION_UPDATE = 3;
  // A one-off instantaneous consumption billed per occurrence; never
  // snapshotted.
  METER_ACTION_USAGE = 4;
}
